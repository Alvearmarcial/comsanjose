<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#1a56db" />
  <meta name="description" content="Gestión económica comunitaria" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="ComunidadApp" />
  <link rel="manifest" href="manifest.json" />
  <title>ComunidadApp</title>
  <style>
    :root {
      --primary: #1a56db;
      --primary-dark: #1347b8;
      --success: #057a55;
      --success-bg: #def7ec;
      --danger: #c81e1e;
      --danger-bg: #fde8e8;
      --bg: #f3f4f6;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
      --radius: 12px;
      --shadow: 0 1px 4px rgba(0,0,0,.1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           background: var(--bg); color: var(--text); min-height: 100dvh; }

    /* ── HEADER ── */
    header { background: var(--primary); color: #fff; padding: 16px 16px 20px;
             position: sticky; top: 0; z-index: 10; }
    .header-row { display: flex; justify-content: space-between; align-items: center; }
    header h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: .3px; }
    #btn-admin-toggle { background: rgba(255,255,255,.2); border: none; color: #fff;
      border-radius: 8px; padding: 6px 12px; font-size: .85rem; cursor: pointer;
      display: flex; align-items: center; gap: 6px; }
    #btn-admin-toggle:hover { background: rgba(255,255,255,.3); }

    /* ── CARDS ── */
    .cards { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px;
             padding: 16px; }
    .card { background: var(--card); border-radius: var(--radius);
            box-shadow: var(--shadow); padding: 14px 10px; text-align: center; }
    .card-label { font-size: .7rem; color: var(--muted); text-transform: uppercase;
                  letter-spacing: .5px; margin-bottom: 6px; }
    .card-value { font-size: 1.1rem; font-weight: 700; }
    .card-value.saldo  { color: var(--primary); }
    .card-value.ingreso{ color: var(--success); }
    .card-value.egreso { color: var(--danger); }

    /* ── MAIN ── */
    main { padding: 0 16px 100px; }
    .section-title { font-size: .8rem; color: var(--muted); text-transform: uppercase;
                     letter-spacing: .5px; margin: 4px 0 10px; }

    /* ── MOVIMIENTOS ── */
    #list-container { display: flex; flex-direction: column; gap: 8px; }
    .mov-item { background: var(--card); border-radius: var(--radius);
                box-shadow: var(--shadow); padding: 12px 14px;
                display: flex; justify-content: space-between; align-items: center;
                border-left: 4px solid transparent; }
    .mov-item.ingreso { border-color: var(--success); }
    .mov-item.egreso  { border-color: var(--danger); }
    .mov-info { flex: 1; }
    .mov-motivo { font-size: .95rem; font-weight: 600; }
    .mov-meta   { font-size: .78rem; color: var(--muted); margin-top: 2px; }
    .mov-right  { text-align: right; }
    .mov-monto  { font-size: 1rem; font-weight: 700; }
    .mov-monto.ingreso { color: var(--success); }
    .mov-monto.egreso  { color: var(--danger); }
    .mov-actions { display: flex; gap: 6px; margin-top: 6px; justify-content: flex-end; }
    .btn-icon { background: none; border: 1px solid var(--border); border-radius: 6px;
                padding: 3px 8px; font-size: .75rem; cursor: pointer; color: var(--muted); }
    .btn-icon:hover { background: var(--bg); }
    .btn-icon.del:hover { color: var(--danger); border-color: var(--danger); }

    .empty-state { text-align: center; color: var(--muted); padding: 40px 0;
                   font-size: .9rem; }

    /* ── FAB ── */
    #fab { position: fixed; bottom: 24px; right: 20px; width: 56px; height: 56px;
           background: var(--primary); color: #fff; border: none; border-radius: 50%;
           font-size: 1.6rem; cursor: pointer; box-shadow: 0 4px 14px rgba(26,86,219,.4);
           display: none; align-items: center; justify-content: center; z-index: 20; }
    #fab:hover { background: var(--primary-dark); }
    #fab.visible { display: flex; }

    /* ── MODAL BASE ── */
    .modal-backdrop { display: none; position: fixed; inset: 0;
                      background: rgba(0,0,0,.45); z-index: 100;
                      align-items: flex-end; justify-content: center; }
    .modal-backdrop.open { display: flex; }
    .modal { background: #fff; border-radius: 20px 20px 0 0; width: 100%;
             max-width: 480px; padding: 24px 20px 36px; animation: slideUp .25s ease; }
    @keyframes slideUp { from { transform: translateY(40px); opacity: 0; }
                         to   { transform: translateY(0);    opacity: 1; } }
    .modal h2 { font-size: 1.1rem; margin-bottom: 18px; }
    .modal-close { float: right; background: none; border: none; font-size: 1.4rem;
                   cursor: pointer; color: var(--muted); line-height: 1; }

    /* ── FORM ── */
    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: .82rem; color: var(--muted); margin-bottom: 5px; }
    input, select, textarea {
      width: 100%; border: 1px solid var(--border); border-radius: 8px;
      padding: 10px 12px; font-size: 1rem; outline: none;
      transition: border-color .2s; background: #fff; color: var(--text); }
    input:focus, select:focus, textarea:focus { border-color: var(--primary); }
    textarea { resize: none; height: 72px; }
    .btn-primary { width: 100%; background: var(--primary); color: #fff; border: none;
                   border-radius: 10px; padding: 13px; font-size: 1rem; font-weight: 600;
                   cursor: pointer; margin-top: 4px; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-primary:disabled { opacity: .6; cursor: not-allowed; }
    .form-error { color: var(--danger); font-size: .82rem; margin-top: 4px; display: none; }
    .form-error.show { display: block; }

    /* ── TIPO TOGGLE ── */
    .tipo-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .tipo-btn { border: 2px solid var(--border); background: #fff; border-radius: 10px;
                padding: 10px; text-align: center; cursor: pointer; font-size: .9rem;
                font-weight: 600; color: var(--muted); transition: all .15s; }
    .tipo-btn.active.ingreso { border-color: var(--success); background: var(--success-bg);
                                color: var(--success); }
    .tipo-btn.active.egreso  { border-color: var(--danger);  background: var(--danger-bg);
                                color: var(--danger); }

    /* ── TOAST ── */
    #toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
             background: #1f2937; color: #fff; padding: 10px 20px; border-radius: 20px;
             font-size: .88rem; opacity: 0; transition: opacity .3s; z-index: 200;
             pointer-events: none; white-space: nowrap; }
    #toast.show { opacity: 1; }

    /* ── SPINNER ── */
    .spinner { display: flex; justify-content: center; padding: 30px 0; }
    .spinner div { width: 10px; height: 10px; border-radius: 50%;
                   background: var(--primary); margin: 0 4px;
                   animation: bounce .6s infinite alternate; }
    .spinner div:nth-child(2) { animation-delay: .2s; }
    .spinner div:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce { to { transform: translateY(-10px); opacity: .4; } }

    /* ── MES SELECTOR ── */
    .mes-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .mes-row select { flex: 1; }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-row">
    <h1>💰 ComunidadApp</h1>
    <button id="btn-admin-toggle">🔐 Admin</button>
  </div>
</header>

<!-- CARDS -->
<div class="cards">
  <div class="card">
    <div class="card-label">Saldo</div>
    <div class="card-value saldo" id="card-saldo">—</div>
  </div>
  <div class="card">
    <div class="card-label">Ingresos</div>
    <div class="card-value ingreso" id="card-ingresos">—</div>
  </div>
  <div class="card">
    <div class="card-label">Egresos</div>
    <div class="card-value egreso" id="card-egresos">—</div>
  </div>
</div>

<!-- MAIN -->
<main>
  <div class="mes-row">
    <select id="sel-mes"></select>
  </div>
  <div class="section-title">Movimientos</div>
  <div id="list-container"><div class="spinner"><div></div><div></div><div></div></div></div>
</main>

<!-- FAB -->
<button id="fab" class="visible" title="Nuevo movimiento" style="display:none">＋</button>

<!-- TOAST -->
<div id="toast"></div>

<!-- ═══════════════════════════════════════
     MODAL: LOGIN ADMIN
════════════════════════════════════════ -->
<div class="modal-backdrop" id="modal-login">
  <div class="modal">
    <button class="modal-close" data-close="modal-login">×</button>
    <h2>Acceso Administrador</h2>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="inp-pass" placeholder="Ingresá tu contraseña" autocomplete="current-password" />
      <div class="form-error" id="err-login">Contraseña incorrecta.</div>
    </div>
    <button class="btn-primary" id="btn-login">Ingresar</button>
  </div>
</div>

<!-- ═══════════════════════════════════════
     MODAL: CAMBIAR CONTRASEÑA
════════════════════════════════════════ -->
<div class="modal-backdrop" id="modal-cambiar-pass">
  <div class="modal">
    <h2>🔑 Cambiar contraseña</h2>
    <p style="font-size:.85rem;color:var(--muted);margin-bottom:14px;" id="txt-pass-hint">
      Por seguridad, cambiá la contraseña antes de continuar.
    </p>
    <div class="form-group">
      <label>Nueva contraseña</label>
      <input type="password" id="inp-new-pass" placeholder="Mínimo 4 caracteres" />
    </div>
    <div class="form-group">
      <label>Confirmar contraseña</label>
      <input type="password" id="inp-confirm-pass" placeholder="Repetí la nueva contraseña" />
      <div class="form-error" id="err-pass">Las contraseñas no coinciden.</div>
    </div>
    <button class="btn-primary" id="btn-cambiar-pass">Guardar contraseña</button>
  </div>
</div>

<!-- ═══════════════════════════════════════
     MODAL: NUEVO / EDITAR MOVIMIENTO
════════════════════════════════════════ -->
<div class="modal-backdrop" id="modal-mov">
  <div class="modal">
    <button class="modal-close" data-close="modal-mov">×</button>
    <h2 id="modal-mov-title">Nuevo movimiento</h2>
    <input type="hidden" id="mov-edit-id" />

    <div class="form-group">
      <label>Tipo</label>
      <div class="tipo-group">
        <div class="tipo-btn ingreso active ingreso" id="tipo-ingreso" data-tipo="Ingreso">✅ Ingreso</div>
        <div class="tipo-btn egreso"                id="tipo-egreso"  data-tipo="Egreso" >❌ Egreso</div>
      </div>
    </div>
    <div class="form-group">
      <label>Fecha</label>
      <input type="date" id="mov-fecha" />
    </div>
    <div class="form-group">
      <label>Monto ($)</label>
      <input type="number" id="mov-monto" placeholder="0.00" min="0.01" step="0.01" inputmode="decimal" />
    </div>
    <div class="form-group">
      <label>Motivo</label>
      <textarea id="mov-motivo" placeholder="Descripción del movimiento..."></textarea>
      <div class="form-error" id="err-mov">Completá todos los campos correctamente.</div>
    </div>
    <button class="btn-primary" id="btn-guardar-mov">Guardar</button>
  </div>
</div>

<script>
// ╔══════════════════════════════════════════════════════════════╗
// ║  CONFIGURACIÓN — reemplazá con tu URL de Google Apps Script  ║
// ╚══════════════════════════════════════════════════════════════╝
const API_URL = 'https://script.google.com/macros/s/AKfycbwByWlm2bJfzKegXc98-I2eqfYL2G3YuFnUuYB3SaXWQ0xJCbr5IqlrY3rzPuZtAmA4/exec';

// ──────────────────────────────────────
// ESTADO
// ──────────────────────────────────────
let isAdmin    = false;
let tipoActivo = 'Ingreso';
let movimientos = [];
let mesFiltro  = '';

// ──────────────────────────────────────
// UTILIDADES
// ──────────────────────────────────────
const $ = id => document.getElementById(id);
const fmt = n => '$' + Number(n).toLocaleString('es-AR', {minimumFractionDigits:2, maximumFractionDigits:2});
const fmtFecha = d => { const [y,m,dia] = d.split('-'); return `${dia}/${m}/${y}`; };

function showToast(msg, ms=2500) {
  const t = $('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), ms);
}

function openModal(id)  { $(id).classList.add('open'); }
function closeModal(id) { $(id).classList.remove('open'); }

document.querySelectorAll('[data-close]').forEach(btn =>
  btn.addEventListener('click', () => closeModal(btn.dataset.close))
);
document.querySelectorAll('.modal-backdrop').forEach(bd =>
  bd.addEventListener('click', e => { if(e.target === bd) closeModal(bd.id); })
);

function todayISO() {
  const d = new Date(); const z = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${z(d.getMonth()+1)}-${z(d.getDate())}`;
}

// ──────────────────────────────────────
// SESIÓN ADMIN (localStorage)
// ──────────────────────────────────────
function setAdminSession(on) {
  isAdmin = on;
  if(on) localStorage.setItem('admin_session','1');
  else   localStorage.removeItem('admin_session');
  $('btn-admin-toggle').textContent = on ? '🔓 Salir' : '🔐 Admin';
  $('fab').style.display = on ? 'flex' : 'none';
  renderList();
}

// ──────────────────────────────────────
// API  —  fetch con action
// ──────────────────────────────────────
async function api(params) {
  const url = new URL(API_URL);
  Object.entries(params).forEach(([k,v]) => url.searchParams.set(k, v));
  const r = await fetch(url.toString());
  if(!r.ok) throw new Error('Error de red');
  return r.json();
}

async function apiPost(body) {
  const r = await fetch(API_URL, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(body)
  });
  if(!r.ok) throw new Error('Error de red');
  return r.json();
}

// ──────────────────────────────────────
// CARGAR MOVIMIENTOS
// ──────────────────────────────────────
async function cargarMovimientos() {
  $('list-container').innerHTML = '<div class="spinner"><div></div><div></div><div></div></div>';
  try {
    const data = await api({ action: 'getMovimientos' });
    movimientos = data.movimientos || [];
    poblarMeses();
    calcularYRenderizar();
  } catch(e) {
    $('list-container').innerHTML = '<div class="empty-state">⚠️ No se pudo conectar con el servidor.</div>';
  }
}

// ──────────────────────────────────────
// SELECTOR DE MES
// ──────────────────────────────────────
function poblarMeses() {
  const sel = $('sel-mes');
  const meses = [...new Set(movimientos.map(m => m.fecha.substring(0,7)))].sort().reverse();
  const hoy = todayISO().substring(0,7);
  if(!meses.includes(hoy)) meses.unshift(hoy);
  sel.innerHTML = '';
  meses.forEach(m => {
    const [y, mo] = m.split('-');
    const nom = new Date(y, mo-1, 1).toLocaleString('es-AR', {month:'long', year:'numeric'});
    sel.insertAdjacentHTML('beforeend',
      `<option value="${m}" ${m===mesFiltro?'selected':''}>${nom.charAt(0).toUpperCase()+nom.slice(1)}</option>`);
  });
  if(!mesFiltro) mesFiltro = sel.value;
}

$('sel-mes').addEventListener('change', e => { mesFiltro = e.target.value; calcularYRenderizar(); });

// ──────────────────────────────────────
// CÁLCULO Y RENDER
// ──────────────────────────────────────
function calcularYRenderizar() {
  // Saldo acumulado hasta fin del mes anterior
  const mesRef = mesFiltro;
  const anterior = movimientos.filter(m => m.fecha.substring(0,7) < mesRef);
  const saldoAnterior = anterior.reduce((acc,m) =>
    acc + (m.tipo === 'Ingreso' ? +m.monto : -m.monto), 0);

  const delMes = movimientos.filter(m => m.fecha.substring(0,7) === mesRef);
  const totalIngresos = delMes.filter(m => m.tipo==='Ingreso').reduce((a,m) => a + +m.monto, 0);
  const totalEgresos  = delMes.filter(m => m.tipo==='Egreso' ).reduce((a,m) => a + +m.monto, 0);
  const saldo = saldoAnterior + totalIngresos - totalEgresos;

  $('card-saldo').textContent    = fmt(saldo);
  $('card-ingresos').textContent = fmt(totalIngresos);
  $('card-egresos').textContent  = fmt(totalEgresos);

  renderList(delMes);
}

function renderList(lista) {
  if(!lista) lista = movimientos.filter(m => m.fecha.substring(0,7) === mesFiltro);
  const sorted = [...lista].sort((a,b) => b.fecha.localeCompare(a.fecha));
  const c = $('list-container');
  if(!sorted.length) { c.innerHTML='<div class="empty-state">Sin movimientos este mes.</div>'; return; }
  c.innerHTML = sorted.map(m => `
    <div class="mov-item ${m.tipo.toLowerCase()}">
      <div class="mov-info">
        <div class="mov-motivo">${escHtml(m.motivo)}</div>
        <div class="mov-meta">${fmtFecha(m.fecha)} · ${m.tipo}</div>
        ${isAdmin ? `<div class="mov-actions">
          <button class="btn-icon" onclick="editarMov('${m.id}')">✏️ Editar</button>
          <button class="btn-icon del" onclick="eliminarMov('${m.id}')">🗑️ Eliminar</button>
        </div>` : ''}
      </div>
      <div class="mov-right">
        <div class="mov-monto ${m.tipo.toLowerCase()}">${m.tipo==='Ingreso'?'+':'-'}${fmt(m.monto)}</div>
      </div>
    </div>`).join('');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ──────────────────────────────────────
// LOGIN ADMIN
// ──────────────────────────────────────
$('btn-admin-toggle').addEventListener('click', () => {
  if(isAdmin) { setAdminSession(false); showToast('Sesión cerrada'); return; }
  $('inp-pass').value = ''; $('err-login').classList.remove('show');
  openModal('modal-login');
});

$('btn-login').addEventListener('click', async () => {
  const pass = $('inp-pass').value.trim();
  if(!pass) return;
  $('btn-login').disabled = true; $('btn-login').textContent = 'Verificando...';
  try {
    const r = await api({ action: 'login', password: pass });
    if(r.ok) {
      closeModal('modal-login');
      setAdminSession(true);
      if(r.firstLogin) {
        $('txt-pass-hint').textContent = 'Por seguridad, cambiá la contraseña predeterminada antes de continuar.';
        openModal('modal-cambiar-pass');
      } else {
        showToast('Bienvenido, admin 👋');
      }
    } else {
      $('err-login').classList.add('show');
    }
  } catch { showToast('⚠️ Error de conexión'); }
  finally { $('btn-login').disabled=false; $('btn-login').textContent='Ingresar'; }
});

$('inp-pass').addEventListener('keydown', e => { if(e.key==='Enter') $('btn-login').click(); });

// ──────────────────────────────────────
// CAMBIAR CONTRASEÑA
// ──────────────────────────────────────
// Botón en header para admin ya logueado
document.addEventListener('click', e => {
  if(e.target.id==='btn-cambiar-pass-header') {
    $('txt-pass-hint').textContent = 'Ingresá la nueva contraseña.';
    $('inp-new-pass').value=''; $('inp-confirm-pass').value='';
    openModal('modal-cambiar-pass');
  }
});

$('btn-cambiar-pass').addEventListener('click', async () => {
  const np = $('inp-new-pass').value.trim();
  const cp = $('inp-confirm-pass').value.trim();
  if(np.length < 4 || np !== cp) { $('err-pass').classList.add('show'); return; }
  $('err-pass').classList.remove('show');
  $('btn-cambiar-pass').disabled=true; $('btn-cambiar-pass').textContent='Guardando...';
  try {
    await apiPost({ action:'changePassword', newPassword: np });
    closeModal('modal-cambiar-pass');
    showToast('Contraseña actualizada ✅');
  } catch { showToast('⚠️ Error al guardar'); }
  finally { $('btn-cambiar-pass').disabled=false; $('btn-cambiar-pass').textContent='Guardar contraseña'; }
});

// ──────────────────────────────────────
// FAB — NUEVO MOVIMIENTO
// ──────────────────────────────────────
$('fab').addEventListener('click', () => {
  $('modal-mov-title').textContent = 'Nuevo movimiento';
  $('mov-edit-id').value = '';
  $('mov-fecha').value  = todayISO();
  $('mov-monto').value  = '';
  $('mov-motivo').value = '';
  $('err-mov').classList.remove('show');
  setTipo('Ingreso');
  openModal('modal-mov');
});

// ── Tipo toggle
['ingreso','egreso'].forEach(t => {
  $(`tipo-${t}`).addEventListener('click', () => setTipo(t.charAt(0).toUpperCase()+t.slice(1)));
});
function setTipo(t) {
  tipoActivo = t;
  $('tipo-ingreso').classList.toggle('active', t==='Ingreso');
  $('tipo-egreso' ).classList.toggle('active', t==='Egreso');
}

// ── Guardar movimiento
$('btn-guardar-mov').addEventListener('click', async () => {
  const fecha  = $('mov-fecha').value;
  const monto  = parseFloat($('mov-monto').value);
  const motivo = $('mov-motivo').value.trim();
  const editId = $('mov-edit-id').value;

  if(!fecha || !monto || monto<=0 || !motivo) {
    $('err-mov').classList.add('show'); return;
  }
  $('err-mov').classList.remove('show');
  $('btn-guardar-mov').disabled=true; $('btn-guardar-mov').textContent='Guardando...';

  try {
    const payload = { action: editId ? 'editMovimiento' : 'addMovimiento',
                      id: editId, fecha, tipo: tipoActivo, monto, motivo };
    const r = await apiPost(payload);
    if(r.ok) {
      closeModal('modal-mov');
      showToast(editId ? 'Movimiento actualizado ✅' : 'Movimiento guardado ✅');
      await cargarMovimientos();
    } else { showToast('⚠️ Error al guardar'); }
  } catch { showToast('⚠️ Error de conexión'); }
  finally { $('btn-guardar-mov').disabled=false; $('btn-guardar-mov').textContent='Guardar'; }
});

// ──────────────────────────────────────
// EDITAR
// ──────────────────────────────────────
function editarMov(id) {
  const m = movimientos.find(x => x.id===id); if(!m) return;
  $('modal-mov-title').textContent = 'Editar movimiento';
  $('mov-edit-id').value = id;
  $('mov-fecha').value   = m.fecha;
  $('mov-monto').value   = m.monto;
  $('mov-motivo').value  = m.motivo;
  setTipo(m.tipo);
  $('err-mov').classList.remove('show');
  openModal('modal-mov');
}

// ──────────────────────────────────────
// ELIMINAR
// ──────────────────────────────────────
async function eliminarMov(id) {
  if(!confirm('¿Eliminar este movimiento?')) return;
  try {
    const r = await apiPost({ action:'deleteMovimiento', id });
    if(r.ok) { showToast('Eliminado 🗑️'); await cargarMovimientos(); }
    else showToast('⚠️ No se pudo eliminar');
  } catch { showToast('⚠️ Error de conexión'); }
}

// ──────────────────────────────────────
// INIT
// ──────────────────────────────────────
(function init() {
  // Restaurar sesión admin
  if(localStorage.getItem('admin_session')) setAdminSession(true);
  // Mes actual por defecto
  mesFiltro = todayISO().substring(0,7);
  $('sel-mes').innerHTML = '';
  cargarMovimientos();
})();
</script>
